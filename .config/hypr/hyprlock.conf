background {
    monitor =
    path = /home/sam/Pictures/liebe-black-clover-3840x2160-11223.jpg   # Change this to your actual wallpaper path
    blur_passes = 2
}

input-field {
    monitor = DP-2
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    position = 0, 80
    halign = center
    valign = center
}
